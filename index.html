<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocWeb — Administration</title>
  <style>
    :root {
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --bg: #f4f5f7;
      --card: #ffffff;
      --border: #e3e5e9;
      --text: #1c1e26;
      --text-muted: #6b7280;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      max-width: 880px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
      background: var(--bg);
      color: var(--text);
    }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 1.75rem; }

    #login-form {
      display: flex; flex-direction: column; gap: 0.75rem; max-width: 320px;
      background: var(--card); padding: 1.75rem; border-radius: 12px; border: 1px solid var(--border);
    }
    input, textarea {
      padding: 0.55rem 0.7rem; font-size: 0.92rem; border: 1px solid var(--border);
      border-radius: 8px; font-family: inherit; background: #fff; color: var(--text);
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
    button {
      padding: 0.6rem 1.1rem; font-size: 0.9rem; font-weight: 600; cursor: pointer;
      background: var(--accent); color: #fff; border: none; border-radius: 8px; transition: background .15s;
    }
    button:hover { background: var(--accent-hover); }
    #logout { background: transparent; color: var(--text-muted); border: 1px solid var(--border); margin-top: 2rem; }
    #logout:hover { background: #fff; color: var(--text); }

    #app { display: none; }
    nav { display: flex; gap: 0.5rem; margin-bottom: 1.75rem; }
    nav button {
      background: transparent; color: var(--text-muted); border: 1px solid var(--border);
      padding: 0.5rem 1rem; border-radius: 8px; font-weight: 600;
    }
    nav button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .panel { display: none; }
    .panel.active { display: block; }

    details.groupe {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      margin-bottom: 0.85rem; overflow: hidden;
    }
    details.groupe summary {
      cursor: pointer; padding: 0.9rem 1.1rem; font-weight: 700; font-size: 0.92rem;
      list-style: none; display: flex; align-items: center; justify-content: space-between;
    }
    details.groupe summary::-webkit-details-marker { display: none; }
    details.groupe summary::after { content: '+'; color: var(--text-muted); font-weight: 400; }
    details.groupe[open] summary::after { content: '−'; }
    details.groupe summary:hover { background: #fafafa; }
    .groupe-body { padding: 0 1.1rem 1.1rem; display: flex; flex-direction: column; gap: 0.75rem; }

    .row { display: flex; flex-direction: column; gap: 0.3rem; }
    .row label { font-size: 0.76rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .03em; }
    .row input, .row textarea { width: 100%; }

    #status { font-size: 0.82rem; color: var(--text-muted); margin-top: 1rem; min-height: 1.2em; }
    #error { color: #b00020; font-size: 0.85rem; }

    #produits-table { border-collapse: collapse; background: var(--card); border-radius: 12px; min-width: 720px; width: 100%; }
    #produits-table th { font-size: 0.76rem; text-transform: uppercase; color: var(--text-muted); padding: 0.6rem; border-bottom: 1px solid var(--border); white-space: nowrap; }
    #produits-table td { padding: 0.5rem 0.6rem; border-bottom: 1px solid var(--border); }
    #produits-table input { width: 100%; min-width: 70px; }
    #add-produit { margin-top: 1rem; }

    .commande-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 1rem 1.1rem; margin-bottom: 0.85rem;
    }
    .commande-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 1rem; margin-bottom: 0.6rem; flex-wrap: wrap;
    }
    .commande-client { font-weight: 700; font-size: 0.92rem; }
    .commande-date { font-size: 0.76rem; color: var(--text-muted); }
    .commande-montants { text-align: right; }
    .commande-total { font-weight: 700; font-size: 1rem; }
    .commande-commission { font-size: 0.74rem; color: var(--text-muted); }
    .commande-statut {
      display: inline-block; font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .03em; padding: 0.2rem 0.55rem; border-radius: 100px; margin-top: 0.3rem;
    }
    .commande-statut.payee { background: #dcfce7; color: #15803d; }
    .commande-statut.remboursee { background: #fee2e2; color: #b91c1c; }
    .commande-statut.en_attente { background: #fef3c7; color: #92400e; }
    .commande-articles { font-size: 0.82rem; color: var(--text-muted); border-top: 1px solid var(--border); padding-top: 0.6rem; margin-top: 0.4rem; }
    .commande-articles div { padding: 0.15rem 0; }
    .commande-actions { margin-top: 0.7rem; }
    .btn-rembourser { background: transparent; color: #b91c1c; border: 1px solid #fecaca; font-size: 0.8rem; padding: 0.4rem 0.8rem; }
    .btn-rembourser:hover { background: #fef2f2; }
    .btn-rembourser:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

  <h1>Administration LocWeb</h1>

  <form id="login-form">
    <input type="email" id="email" placeholder="Email" autocomplete="username" required>
    <input type="password" id="password" placeholder="Mot de passe" autocomplete="current-password" required>
    <button type="submit">Se connecter</button>
    <a href="#" id="forgot-password" style="font-size:0.82rem;color:var(--text-muted);text-decoration:underline;">Mot de passe oublié ?</a>
    <p id="error"></p>
  </form>

  <div id="app">
    <p id="site-name" style="font-size:0.82rem;color:var(--text-muted);margin-bottom:1rem;"></p>
    <nav>
      <button data-panel="textes" class="active">Textes</button>
      <button data-panel="images">Images</button>
      <button data-panel="produits">Produits / tarifs</button>
      <button data-panel="commandes">Commandes</button>
    </nav>

    <section id="panel-textes" class="panel active">
      <div id="textes-list"></div>
    </section>

    <section id="panel-images" class="panel">
      <div id="images-list"></div>
    </section>

    <section id="panel-produits" class="panel">
      <div style="overflow-x:auto;">
        <table id="produits-table">
          <thead>
            <tr><th align="left">Nom</th><th align="left">Prix</th><th align="left">Catégorie</th><th align="left">Stock</th><th align="left">Image</th><th align="left">Description</th><th>Disponible</th><th></th></tr>
          </thead>
          <tbody id="produits-body"></tbody>
        </table>
      </div>
      <button id="add-produit">+ Ajouter un produit</button>
    </section>

    <section id="panel-commandes" class="panel">
      <div id="commandes-list"></div>
    </section>

    <p id="status"></p>
    <button id="logout">Se déconnecter</button>
  </div>

  <script type="module" src="admin.js?v=4"></script>
</body>
</html>
